<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tomogachi</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="shell">
    <header>
      <h1 id="nameTitle">Tomogachi</h1>
      <p id="stageText">Stage: Egg</p>

      <div id="nameBox" class="name-box">
        <input id="nameInput" type="text" maxlength="16" placeholder="Name your Tomogachi" />
        <button id="saveNameButton" title="Save name" aria-label="Save name">✅</button>
      </div>
    </header>
    <section class="screen">
      <pre id="pet" class="pet"></pre>
      <p id="status">Loading...</p>
      <p id="timerText">Timer loading...</p>
      <p id="nextNeedText">Needs loading...</p>
    </section>

    <section class="stats">
      <label>
        Hunger
        <progress id="hunger" value="0" max="100"></progress>
      </label>

      <label>
        Happiness
        <progress id="happiness" value="50" max="100"></progress>
      </label>

      <label>
        Energy
        <progress id="energy" value="70" max="100"></progress>
      </label>

      <label>
        Cleanliness
        <progress id="cleanliness" value="100" max="100"></progress>
      </label>
    </section>
    <section class="controls">
      <button id="petEggButton" title="Pet egg" aria-label="Pet egg">👋</button>

      <div class="button-row">
        <button id="saladButton" title="Give salad" aria-label="Give salad">🥗</button>
        <button id="friesButton" title="Give fries" aria-label="Give fries">🍟</button>
      </div>

      <div class="button-row">
        <button id="playButton" title="Play Pong" aria-label="Play Pong">🏓</button>
        <button id="cleanButton" title="Clean" aria-label="Clean">🧼</button>
        <button id="sleepButton" title="Sleep" aria-label="Sleep">💤</button>
      </div>

      <button id="skipButton" class="debug" title="Skip 2.5 minutes" aria-label="Skip 2.5 minutes">⏩</button>
      <button id="resetButton" class="danger" title="Reset pet" aria-label="Reset pet">🔄</button>
    </section>
  </main>
  <script src="game.js"></script>
  <script src="popup.js"></script>
</body>
</html>
